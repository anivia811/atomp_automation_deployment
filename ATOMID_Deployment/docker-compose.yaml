version: "2.4"

networks:
  atomid:
    driver: bridge
    ipam:      
      config:
        - subnet: 10.20.0.0/24
          gateway: 10.20.0.1

services:
  atomid-mysql:
    image: mysql:8.0.34
    container_name: atomid-mysql
    healthcheck:
      test: mysql -u atomp --password=atomp@12345 -e "SHOW DATABASES;"
    networks:
      atomid:
        ipv4_address: ${DOCKER_NET_IP_MYSQL}
    volumes:
      - ./mysql-volume:/var/lib/mysql
      - ./script/deploy/atomid.sql:/source/atompid.sql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=atomid
      - MYSQL_USER=atomp
      - MYSQL_PASSWORD=atomp@12345
  atomid-redis:
    image: redis:8.6.1
    container_name: atomid-redis
    networks:
      atomid:
        ipv4_address: ${DOCKER_NET_IP_REDIS}
  atomid:
    image: atomid/web:b-20260715
    container_name: atomid
    networks:
      atomid:
        ipv4_address: ${DOCKER_NET_IP_ATOMID}
    ports:
      - "8081:8081"
    depends_on:
      atomid-mysql:
        condition: service_healthy
    volumes:
      - ./script/deploy/appenv/database.json:/app/config/environments/production/database.json
      - ./script/deploy/appenv/server.json:/app/config/environments/production/server.json
      - ./script/deploy/appenv/client-privatekey.pem:/config/client-privatekey.pem
      - ./script/deploy/appenv/client-publickey.pem:/config/client-publickey.pem
      - ./script/deploy/appenv/service-privatekey.pem:/config/service-privatekey.pem
      - ./script/deploy/appenv/service-publickey.pem:/config/service-publickey.pem
      - ./script/deploy/appenv/public_fixed:/app/public
      - ./uploads:/app/public/uploads
      # - ./script/deploy/appenv/server.js:/app/server.js
      # - ./script/deploy/appenv/invitations.controller.js:/app/app/api/invitations/invitations.controller.js
    environment:
      - NODE_ENV=production
    command: node server.js
    

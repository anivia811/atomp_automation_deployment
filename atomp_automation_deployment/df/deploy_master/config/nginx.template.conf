#daemon off;
worker_processes 4;

events {
  worker_connections 1024;
}

http {
  upstream stf_app {
    server __DF_GATEWAY_IP__:3100 max_fails=0;
  }

  upstream stf_auth {
    server __DF_GATEWAY_IP__:3200 max_fails=0;
  }

  upstream stf_storage_apk {
    server __DF_GATEWAY_IP__:3300 max_fails=0;
  }

  upstream stf_storage_image {
    server __DF_GATEWAY_IP__:3400 max_fails=0;
  }

  upstream stf_storage_permanent {
    server __DF_GATEWAY_IP__:4200 max_fails=0;
  }

  upstream stf_storage {
    server __DF_GATEWAY_IP__:3500 max_fails=0;
  }

  upstream stf_websocket {
    server __DF_GATEWAY_IP__:3600 max_fails=0;
  }

  upstream stf_api {
    server __DF_GATEWAY_IP__:3700 max_fails=0;
  }

  upstream stf_api_fpt {
    server __DF_GATEWAY_IP__:3710 max_fails=0;
  }

  upstream stf_storage_ipa {
    server __DF_GATEWAY_IP__:3800 max_fails=0;
  }

  upstream stf_stream_gate_client {
    server __DF_GATEWAY_IP__:3900 max_fails=0;
  }

  upstream stf_stream_gate_device {
    server __DF_GATEWAY_IP__:7280 max_fails=0;
  }

  upstream stf_stream_gate_audio_client {
    server __DF_GATEWAY_IP__:4100 max_fails=0;
  }

  upstream stf_stream_gate_audio_device {
    server __DF_GATEWAY_IP__:7290 max_fails=0;
  }


  upstream stf_signaling {
    server __DF_GATEWAY_IP__:4000 max_fails=0;
  }

  upstream tester40_client {
      server __DF_GATEWAY_IP__:4101;
  }
  upstream tester40_api {
      server __DF_GATEWAY_IP__:3001;
  }
  upstream tester40_websocket {
      server __DF_GATEWAY_IP__:3030;
  }
  upstream tester40_tasker {
      server __DF_GATEWAY_IP__:3101;
  }
  upstream studio_client {
      server __DF_GATEWAY_IP__:4201;
  }
  upstream studio_api {
      server __DF_GATEWAY_IP__:3301;
  }
  upstream studio_websocket {
      server __DF_GATEWAY_IP__:3350;
  }
  upstream storage_api {
      server __DF_GATEWAY_IP__:6801;
  }
  upstream atomid {
      server __DF_GATEWAY_IP__:8081;
  }
  upstream storage_provider1 {
      server 10.206.85.174:4729; # TEST PROVIDER
  }
  upstream storage_providerqoodstg {
      server 10.206.112.3:4729; # TEST PROVIDER
  }


  types {
    application/javascript  js;
    image/gif               gif;
    image/jpeg              jpg;
    text/css                css;
    text/html               html;
  }

  map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
  }

  map $http_cookie $httponly_cookie {
    default "HttpOnly";
    "~*token" "";
  }
  server_tokens off;
  access_log /dev/stdout;
  error_log  /dev/stderr;

  server {
    listen 80;

    server_name __DOMAIN__;
    keepalive_timeout 70;
    root /dev/null;
    resolver 127.0.0.1 valid=300s;
    #resolver 8.8.4.4 8.8.8.8 valid=300s;
    #resolver_timeout 10s;
    
    client_max_body_size 1024M;

    index none;
    server_tokens off;

    # Handle stream gate client
    location /c/ {
      proxy_pass http://stf_stream_gate_client/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

     # Handle stream gate device
    location /dv/ {
      proxy_pass http://stf_stream_gate_device/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Handle stream gate audio client
    location /c-audio/ {
      proxy_pass http://stf_stream_gate_audio_client/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

     # Handle stream gate audio device
    location /dv-audio/ {
      proxy_pass http://stf_stream_gate_audio_device/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }


    location /signaling/ {
      proxy_pass http://stf_signaling/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }


    # Handle stf-provider@floor4.service
    location ~ "/d/p30a/([^/]+)/(?<port>[0-9]{5})/$" {
      proxy_pass http://10.16.89.30:$port/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ "/d/l1000/([^/]+)/(?<port>[0-9]{5})/$" {
      proxy_pass http://10.16.89.10:$port/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # android emulator
    location ~ "/d/l1004/([^/]+)/(?<port>[0-9]{5})/$" {
      proxy_pass http://10.16.89.27:$port/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ios simulator
    location ~ "/d/l1005/([^/]+)/(?<port>[0-9]{5})/$" {
      proxy_pass http://10.16.88.70:$port/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

	# ios simulator
    location ~ "/d/l1006/([^/]+)/(?<port>[0-9]{5})/$" {
      proxy_pass http://10.16.89.30:$port/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ "/d/l1003/([^/]+)/(?<port>[0-9]{5})/$" {
      proxy_pass http://10.16.90.55:$port/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass http://stf_websocket;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $http_x_real_ip;
    }

    location /auth/ {
      proxy_pass http://stf_auth/auth/;
    }

    location /auth/contact/ {
      proxy_pass http://stf_api/auth/contact/;
    }

    location /s/image/ {
      proxy_pass http://stf_storage_image;
      add_header Access-Control-Allow-Origin *;
    }

    location /s/apk/ {
      proxy_pass http://stf_storage_apk;
    }

    location /s/ipa/ {
      proxy_pass http://stf_storage_ipa;
    }

    location /s/permanent/ {
      proxy_pass http://stf_storage_permanent;
    }

    location /s/ {
      proxy_pass http://stf_storage;
    }

    location /api/ {
      if ($http_origin ~* ((https?://.*.atomp.io$)|(https?://10.16.8(8|9).([0-9]+)(:[0-9]+)?$)|(https?://.*.fsoft.com.vn$)|(https?://10.17.70.26(:[0-9]+)?$))) {
         add_header Access-Control-Allow-Origin "$http_origin" always;
      }
      proxy_pass http://stf_api/api/;
      proxy_read_timeout 3600s;
      proxy_hide_header X-Powered-By;
    }

    location /api-fpt/ {
      proxy_pass http://stf_api_fpt/api-fpt/;
    }

    location /devicefarm {
      rewrite ^/devicefarm/?(.*)$ /$1 break;
      proxy_pass http://stf_app;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_cookie_flags token "";
      index none;
    }

    location / {
      if ($http_origin ~* ((https?://.*.atomp.io$)|(https?://10.16.8(8|9).([0-9]+)(:[0-9]+)?$)|(https?://.*.fsoft.com.vn$)|(https?://10.17.70.26(:[0-9]+)?$))) {
	 add_header Access-Control-Allow-Origin "$http_origin" always;
      }
      add_header X-Frame-Options "SAMEORIGIN";
      proxy_set_header X-Forwarded-Proto http;
      proxy_pass http://stf_app;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-RealA-IP $http_x_real_ip;
      proxy_hide_header X-Powered-By;
      proxy_hide_header x-powered-by;
      # Apply HttpOnly to all cookies except token
      #proxy_cookie_path / "/;$httponly_cookie Secure";
      proxy_cookie_flags ~.* HttpOnly Secure;
      #add_header Set-Cookie "HttppOnly=$httponly_cookie; Secure";
      #sub_filter_once off;
      #sub_filter 'Set-Cookie: token='  'Set-Cookie: token=';
      #sub_filter '; HttpOnly' '';
      #sub_filter '; Secure' '';
      proxy_cookie_flags token "";
      index none;
    }

    ############################
    # TESTER 40

    location /tester40 {
        rewrite ^/tester40(.*) /$1 break;
        proxy_pass http://tester40_client;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header HOST $http_host;
        #proxy_cookie_flags token "";
    }

    location /tester40/api {
        proxy_pass http://tester40_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        # Some of API take a long time to process, set proxy timeout to 5m
        proxy_read_timeout 300;
        #proxy_cookie_flags token "";
    }

    location /tester40/uploads {
        rewrite ^/tester40/(.*) /$1 break;
        proxy_pass http://tester40_api;
    }

    location /tester40/socket.io/ {
        rewrite ^/tester40/(.*) /$1 break;
        proxy_pass          http://tester40_websocket;
        # proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header    X-Real-IP $http_x_real_ip;

        # Websocket
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        # proxy_set_header    Host $host;
        # add_header          Cache-Control no-cache;
    }

    ############################
    # TASKER

    location /tasker/api {
        proxy_pass http://tester40_tasker;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    location /tasker/uploads {
        rewrite ^/tasker/(.*) /$1 break;
        proxy_pass http://tester40_tasker;
    }

    ############################
    # STUDIO

    location /studio {
        rewrite ^/studio(.*) /$1 break;
        proxy_pass http://studio_client;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header HOST $http_host;
    }

    location /studio/api {
        proxy_pass http://studio_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        # Some of API take a long time to process, set proxy timeout to 5m
        proxy_read_timeout 300;
    }

    location /studio/socket {
        rewrite ^/studio(.*) /$1 break;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    Host $host;
        proxy_pass          http://studio_websocket;

        # Websocket
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "Upgrade";
    }

    ############################
    # STORAGE

    location /storage {
        proxy_read_timeout 24h;
        proxy_pass http://storage_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }
    location ~ "/fs/provider1/([^/]+)(.*)" {
        proxy_pass http://storage_provider1/$1$2$is_args$args;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_read_timeout 24h;
    }
    location ~ "/fs/providerqoodstg/([^/]+)(.*)" {
        proxy_pass http://storage_providerqoodstg/$1$2$is_args$args;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_read_timeout 24h;
    }

    location /atomid/ {
      	proxy_pass http://atomid/;
    }

  }
}



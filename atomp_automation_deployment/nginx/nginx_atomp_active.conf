user  nginx;
worker_processes  auto;
# worker_processes  4;

error_log  /etc/stderr notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /etc/stdout  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # Both the ATOMID portal (/atomid/) and the Device Farm app (/df/) make
    # ROOT-relative /api/ XHR calls (each bypasses its own <base href>), and the DF
    # XHRs send no Referer, so disambiguate by the X-XSRF-TOKEN header: the DF frontend
    # is AngularJS and always sends it; ATOMID is newer Angular and authenticates with
    # Authorization: Bearer and never sends X-XSRF-TOKEN. So a present X-XSRF-TOKEN means
    # the call is from Device Farm -> route to the DF api unit (:3700); otherwise keep the
    # historical ATOMID default (:8081). Without this the DF /api/v1/user hits ATOMID,
    # getUser() rejects, and the dashboard shows "Access Denied" (/#!/forbidden).
    # Route to DF API (:3700) if X-XSRF-TOKEN header present OR DF session cookie (ssid) present.
    # The DF frontend uses oboe() for streaming device list — oboe does not add X-XSRF-TOKEN
    # automatically like Angular $http does. Fall back to ssid cookie presence so device-list
    # calls (which have no XSRF header) still reach the DF API instead of ATOMID.
    map $http_x_xsrf_token $has_xsrf_token {
        default "";
        "~.+"   "yes";
    }
    map $http_cookie $has_ssid_cookie {
        default "";
        "~ssid=" "yes";
    }
    map "${has_xsrf_token}${has_ssid_cookie}" $api_backend {
        default  http://atomid;
        "~yes"   http://10.193.9.70:3700;
    }

    include /etc/nginx/conf.d/*.conf;

    upstream tester40_client {
        server tester40-client:3000;
    }
    upstream tester40_api {
        server tester40-web:3000;
    }
    upstream tester40_websocket {
        server tester40-web:3030;
    }
    upstream fakescreen_websocket {
        server 10.193.9.70:3111;
    }
    upstream fakeaudio_websocket {
        server 10.193.9.70:3222;
    }
    upstream tester40_tasker {
        server 10.193.9.70:33100;
    }
    upstream studio_client {
        server 10.193.9.70:34200;
    }
    upstream studio_api {
        server 10.193.9.70:33300;
    }
    upstream studio_websocket {
        server 10.193.9.70:33350;
    }
    upstream storage_api {
        server 10.193.9.70:6800;
    }
    upstream testman_client {
        server 10.193.9.70:33220;
    }
    upstream testman_api {
        server 10.193.9.70:33230;
    }
    upstream atomid {
        server atomid:8081;
    }
    upstream storage_provider1 {
        server 10.193.9.70:6800;
    }

    # Dummy server
    upstream dummy {
        server 10.193.9.70:3001;
        server 10.193.9.70:3002;
        server 10.193.9.70:3003;

        # server localhost:3001;
        # server localhost:3002;
        # server localhost:3003;
    }
 
    # Redirect all traffic to HTTPS
    server {
        listen 80;
        # Domain/IP
        server_name 10.193.9.70;
        client_max_body_size 5000M;
        proxy_headers_hash_max_size  512;
        proxy_headers_hash_bucket_size  64;
        
        index none;

    # ############# Enable ssl
    #     return 301 https://$host$request_uri;
    # }
    # server {
    #     listen 443 ssl;
    #     # listen 80;
    
    #     # Add your domain/your IP
    #     server_name 10.193.9.70;
    
    #     # # server certificate
    #     ssl_certificate     /idata/server.pem;
    #     ssl_certificate_key /idata/server.key;
    
    #     # CA certificate
    #     ssl_client_certificate /idata/ca.pem;
    
        # # need to validate client certificate(if this flag optional_no_ca it won't validate client certificates)
        # # Cause "No required ssl certificate was sent"
        # ssl_verify_client on;
    # ############

        location / {
            index none;
        }

        # The STF menu links are absolute hashbang URLs (ng-href='/#!/control',
        # logo, help, $window.open('/#!/control/<serial>')) that drop the /df/
        # prefix -> browser requests bare "/" -> 404. Redirect "/" to /df/; the
        # URL #fragment (e.g. #!/control) is not sent to nginx but browsers
        # re-apply it across a fragment-less redirect (RFC 7231 7.1.2), so the
        # user lands on /df/#!/control. Bare "/" otherwise just 404s (index none).
        location = / {
            return 302 /df/;
        }

        ############################
        # NOTE: For include proxy_params work
        # step1: Create a file named proxy_params
        # step2: Add below line
        # proxy_set_header Host $http_host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;

        ############################
        # TESTER 40

        location /tester40 {
            rewrite ^/tester40(.*) /$1 break;
            proxy_pass http://tester40_client;
            # include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_set_header HOST $http_host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            error_page 502 503 @tester40_starting;
        }

        location @tester40_starting {
            default_type text/html;
            return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Starting...</title><meta http-equiv="refresh" content="8; url=/tester40/"><style>*{box-sizing:border-box}body{margin:0;font-family:sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{background:#fff;border-radius:12px;padding:48px 56px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:400px}h2{margin:0 0 12px;font-size:22px;color:#1a1a2e}.sub{color:#666;margin:0 0 28px;font-size:15px}.bar{width:100%;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden}.fill{height:100%;background:#3a6eff;border-radius:3px;animation:load 8s linear forwards}@keyframes load{from{width:0}to{width:100%}}.hint{margin-top:20px;font-size:13px;color:#999}</style></head><body><div class="card"><h2>&#x1F504; tester40 is starting</h2><p class="sub">Angular build in progress. Redirecting automatically...</p><div class="bar"><div class="fill"></div></div><p class="hint">Page will reload in ~8 seconds</p></div></body></html>';
        }

        location /tester40/api {
            proxy_pass http://tester40_api;
            # include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 100;
        }

        location /tester40/uploads {
            rewrite ^/tester40/(.*) /$1 break;
            proxy_pass http://tester40_api;
        }
        location /tester40/lib {
            rewrite ^/tester40/(.*) /$1 break;
            proxy_pass http://tester40_api;
        }

        location /tester40/socket.io/ {
            rewrite ^/tester40/(.*) /$1 break;
            proxy_pass          http://tester40_websocket;
            # proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header    X-Real-IP $http_x_real_ip;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
            # proxy_set_header    Host $host;
            # add_header          Cache-Control no-cache;
        }

        # ############################
        # # TASKER

        location /tasker/api {
            proxy_pass http://tester40_tasker;
            # include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
        }

        location /tasker/uploads {
            rewrite ^/tasker/(.*) /$1 break;
            proxy_pass http://tester40_tasker;
        }

        ############################
        # STUDIO

        location /studio {
            rewrite ^/studio(.*) /$1 break;
            proxy_pass http://studio_client;
            # include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_set_header HOST $http_host;
        }

        location /studio/api {
            proxy_pass http://studio_api;
            # include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
        }

        location /studio/socket {
            rewrite ^/studio(.*) /$1 break;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    Host $host;
            proxy_pass          http://studio_websocket;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
        }

        ############################
        # STORAGE

        location /storage {
            proxy_pass http://storage_api;
            # include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider1/([^/]+)(.*)" {
            proxy_pass http://storage_provider1/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider2/([^/]+)(.*)" {
            proxy_pass http://storage_provider2/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider3/([^/]+)(.*)" {
            proxy_pass http://storage_provider3/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider4/([^/]+)(.*)" {
            proxy_pass http://storage_provider4/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/providerkrhae/([^/]+)(.*)" {
            proxy_pass http://storage_provider_krhae/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/providerqood1/([^/]+)(.*)" {
            proxy_pass http://storage_provider_qood1/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }

        location /fakescreen/socket {
            rewrite ^/fakescreen(.*) /$1 break;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    Host $host;
            proxy_pass          http://fakescreen_websocket;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
        }
        location /fakeaudio/socket {
            rewrite ^/fakeaudio(.*) /$1 break;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    Host $host;
            proxy_pass          http://fakeaudio_websocket;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
        }

        ############################
        # TESTMAN

        ## NOT behind path
        # location / {
        #     proxy_pass           http://testman_client;
        #     include              proxy_params;
        #     proxy_redirect       off;
        #     proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header     X-Real-IP $http_x_real_ip;
        # }
        ## Behind path
        location /testman {
            rewrite ^/testman(.*) /$1 break;
            proxy_pass           http://testman_client;
            # include              proxy_params;
            proxy_redirect       off;
            proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header     X-Real-IP $http_x_real_ip;
        }

        location /testman/api {
            proxy_pass           http://testman_api;
            # include              proxy_params;
            proxy_redirect       off;
            proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header     X-Real-IP $http_x_real_ip;
        }

        # # NOT behind path
        # location /milestone {
        #     proxy_pass           http://testman_api;
        #     include              proxy_params;
        #     proxy_redirect       off;
        #     proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header     X-Real-IP $http_x_real_ip;
        # }

        # NOT behind path
        location /testman/milestone {
            rewrite ^/testman/(.*) /$1 break;
            proxy_pass http://testman_api;
        }

        # Device Farm (STF) realtime socket. The STF client connects to
        # ws://<host>/socket.io/ at ROOT (socket.io keeps engine.io path = /socket.io
        # and uses /df/ only as origin), so it never hits /df/socket.io/. Without this
        # the dashboard shows the "Disconnected — Try to reconnect" modal. Route root
        # /socket.io/ to the DF websocket unit (:3600). (testman, the old owner, is unused.)
        location /socket.io/ {
            proxy_pass http://10.193.9.70:3600;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        ############################
        # ATOMID
        location /atomid/ {
            proxy_pass http://atomid/; # the last "/" character had effect?
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept-Encoding ""; # disable upstream gzip so sub_filter works
            sub_filter '<base href="/">' '<base href="/atomid/">';
            sub_filter_once on;
            sub_filter_types text/html;
        }
        # ATOMID auth endpoints must always reach ATOMID regardless of ssid/XSRF cookies.
        # The ssid-based routing in the general /api/ block would send these to the DF API
        # when the user has a leftover DF session cookie, breaking ATOMID login.
        location /api/atomid/ {
            proxy_pass http://atomid/api/atomid/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }
        location /api/auth/ {
            proxy_pass http://atomid/api/auth/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # ATOMID frontend calls its backend at absolute /api/ (ignores <base href>),
        # so route root /api/ to the ATOMID server. Only ATOMID uses bare /api/ at root
        # (tester40/studio use /tester40/api, /studio/api).
        location /api/ {
            # $api_backend is chosen by Referer (see map in http{}): /df/ -> DF api :3700,
            # else ATOMID :8081. Both serve /api/... at root, so pass the URI unchanged.
            proxy_pass $api_backend$request_uri;
            proxy_read_timeout 120s;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }
        # ATOMID frontend loads i18n/assets from absolute /assets/ (ignores <base href>),
        # so the translation files 404 at root and the UI shows raw keys (S162, S170...).
        # Route root /assets/ to ATOMID (only ATOMID uses bare /assets/; others are scoped).
        location /assets/ {
            proxy_pass http://atomid/assets/;
            proxy_set_header Host $http_host;
        }
        # location /atomid {
        #     rewrite ^/atomid(.*) /$1 break;
        #     proxy_pass http://10.193.9.70:3800;
        #     include proxy_params;
        #     proxy_redirect off;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Real-IP $http_x_real_ip;
        #     proxy_set_header HOST $http_host;
        # }
        # location /atomid/api {
        #     proxy_pass http://10.193.9.70:3800/api;
        # }

        ############################
        # DEVICE FARM (STF) absolute /static/ (webpack publicPath is hardcoded
        # to /static/app/build/, so dynamically-loaded chunks request /static/
        # at the root regardless of <base href>). Root /static/ is unused by the
        # portal, so route it to the STF backends (same split as /df/static/).
        location /static/bower_components/ {
            proxy_pass http://10.193.9.70:3200;
            proxy_set_header Host $http_host;
        }
        location /static/auth/ {
            proxy_pass http://10.193.9.70:3200;
            proxy_set_header Host $http_host;
        }
        location /static/ {
            proxy_pass http://10.193.9.70:3100;
            proxy_set_header Host $http_host;
        }
        # The STF app page (<base href="/">) loads GLOBAL_APPSTATE via a
        # ROOT-relative script src '/app/api/v1/state.js' (res/app/views/index.pug),
        # and the report link / wasm helper also use '/app/...'. These bypass the
        # /df prefix, so without this route they 404 -> GLOBAL_APPSTATE is undefined
        # -> MenuCtrl throws -> the top-bar tabs never render. Route bare /app/ to
        # the STF app unit. (Same root cause/fix pattern as /static/ and /auth/.)
        location /app/ {
            proxy_pass http://10.193.9.70:3100;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        ############################
        # DEVICE FARM (STF) storage — bare /s/ paths (STF generates root-relative
        # /s/image/, /s/blob/ etc. without the /df/ prefix, so they need their own routes)
        location /s/image/ {
            proxy_pass http://10.193.9.70:3400;
            add_header Access-Control-Allow-Origin *;
            proxy_set_header Host $http_host;
        }
        location /s/apk/ {
            proxy_pass http://10.193.9.70:3300;
            proxy_set_header Host $http_host;
        }
        location /s/ipa/ {
            proxy_pass http://10.193.9.70:3800;
            proxy_set_header Host $http_host;
        }
        location /s/permanent/ {
            proxy_pass http://10.193.9.70:4200;
            proxy_set_header Host $http_host;
        }
        location /s/ {
            proxy_pass http://10.193.9.70:3500;
            proxy_set_header Host $http_host;
        }

        ############################
        # DEVICE FARM (STF) under /df/
        # STF pages use relative assets + <base href="/">. We strip the /df
        # prefix before proxying to the STF backends and rewrite the base href
        # to /df/ so relative assets resolve under /df/. Plain HTTP, same origin
        # as the portal — do NOT add Secure cookies / X-Forwarded-Proto https
        # (documented STF HTTP redirect-loop gotcha).
        # Requires STF app/auth-mock recreated with app-url http://10.193.9.70/df/.

        # auth-mock unit (login) + base href rewrite
        location /df/auth/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3200;
            # backend is mounted at "/" (the /df prefix is stripped above), so its
            # root-relative redirects (e.g. Location: /) lose the /df prefix and 404.
            # Re-add it here. Absolute URLs (http://.../df/...) are left untouched.
            proxy_redirect / /df/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept-Encoding "";
            sub_filter '<base href="/">' '<base href="/df/">';
            sub_filter_once on;
            sub_filter_types text/html;
        }
        # The auth-mock login client posts to ROOT-relative paths
        # ($http.post('/auth/api/v1/mock'), $http.get('/auth/contact')) which start
        # with "/" and therefore BYPASS <base href="/df/">. The browser sends them to
        # /auth/... with no /df prefix, nginx 404s, and the login page shows
        # "Server error. Check log output." Route bare /auth/ to the auth-mock unit so
        # these calls reach it. (Same root cause/fix pattern as ATOMID's /api/ + /assets/.)
        location /auth/ {
            proxy_pass http://10.193.9.70:3200;
            proxy_redirect / /df/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /df/static/bower_components/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3200;
            proxy_set_header Host $http_host;
        }
        location /df/static/auth/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3200;
            proxy_set_header Host $http_host;
        }
        # app webpack static assets
        location /df/static/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3100;
            proxy_set_header Host $http_host;
        }
        # websocket unit (socket.io)
        location /df/socket.io/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3600;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        # REST API unit
        location /df/api/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3700;
            proxy_read_timeout 3600s;
            proxy_hide_header X-Powered-By;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        # storage units
        location /df/s/image/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3400;
            add_header Access-Control-Allow-Origin *;
            proxy_set_header Host $http_host;
        }
        location /df/s/apk/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3300;
            proxy_set_header Host $http_host;
        }
        location /df/s/ipa/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3800;
            proxy_set_header Host $http_host;
        }
        location /df/s/permanent/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:4200;
            proxy_set_header Host $http_host;
        }
        location /df/s/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3500;
            proxy_set_header Host $http_host;
        }
        # stream gates (websocket)
        location /df/c/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3900;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
        }
        location /df/dv/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:7280;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
        }
        location /df/c-audio/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:4100;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
        }
        location /df/dv-audio/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:7290;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
        }
        # Device screen WebSocket — provider publishes ports 11000-11700 on this host;
        # the screen-ws-url-pattern tells the browser to connect here, and nginx
        # proxies it directly to the provider's per-device WebSocket port.
        location ~ "^/d/MCTech/([^/]+)/(?<port>[0-9]{5})/$" {
            proxy_pass http://10.193.9.70:$port/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
        }
        # app unit (catch-all for /df/) + base href rewrite
        location /df/ {
            rewrite ^/df/(.*) /$1 break;
            proxy_pass http://10.193.9.70:3100;
            # post-login the app redirects to "/"; re-add the /df prefix so the
            # browser lands on the dashboard instead of nginx's root 404.
            proxy_redirect / /df/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_hide_header X-Powered-By;
            proxy_set_header Accept-Encoding "";
            sub_filter '<base href="/">' '<base href="/df/">';
            sub_filter_once on;
            sub_filter_types text/html;
        }
        # bare /df -> /df/
        location = /df {
            return 301 /df/;
        }

        ############################
        # Dummy, testing purpose
        location /ai {
            # strip the "/ai" prefix from the path when forwarding to 
            # rewrite ^/ai(/.*)$ $1 break;
            proxy_pass http://dummy;
            # include proxy_params;
            # proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    }
}

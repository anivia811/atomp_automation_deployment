upstream tester40_client {
    server tester40-client:3000;
}
upstream tester40_api {
    server tester40-web:3000;
}
upstream tester40_websocket {
    server tester40-web:3030;
}
upstream tester40_tasker {
    server tasker-web:3000;
}
upstream studio_client {
    server studio-client:3000;
}
upstream studio_api {
    server studio-web:3000;
}
upstream studio_websocket {
    server studio-web:3030;
}
upstream storage_api {
    server storage-web:3000;
}
upstream df_app {
    server app:3000 max_fails=0;
}
upstream df_websocket {
    server websocket:3000 max_fails=0;
}
upstream df_api {
    server api:3000 max_fails=0;
}
upstream df_storage {
    server storage-temp:3000 max_fails=0;
}
upstream df_storage_image {
    server storage-plugin-image:3000 max_fails=0;
}
upstream df_storage_apk {
    server storage-plugin-apk:3000 max_fails=0;
}
upstream df_storage_ipa {
    server storage-plugin-ipa:3000 max_fails=0;
}
upstream df_storage_permanent {
    server storage-permanent:3000 max_fails=0;
}
upstream df_stream_gate {
    server stream-gate:3000 max_fails=0;
}
upstream df_stream_gate_audio {
    server stream-gate-audio:3000 max_fails=0;
}

upstream atomid {
    server atomid:8081;
}

server {
    listen 80;
    server_name 10.193.9.70;
    client_max_body_size 5000M;

    # Entry point: redirect bare root to atomid
    location = / {
        return 302 /atomid/;
    }

    ############################
    # TESTER40

    location /tester40 {
        rewrite ^/tester40(.*) /$1 break;
        proxy_pass http://tester40_client;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header HOST $http_host;
    }

    location /tester40/api {
        proxy_pass http://tester40_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_read_timeout 100;
    }

    location /tester40/uploads {
        rewrite ^/tester40/(.*) /$1 break;
        proxy_pass http://tester40_api;
    }

    location /tester40/lib {
        rewrite ^/tester40/(.*) /$1 break;
        proxy_pass http://tester40_api;
    }

    location /tester40/socket.io/ {
        rewrite ^/tester40/(.*) /$1 break;
        proxy_pass http://tester40_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    ############################
    # TASKER

    location /tasker/api {
        proxy_pass http://tester40_tasker;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    ############################
    # STUDIO

    location /studio {
        rewrite ^/studio(.*) /$1 break;
        proxy_pass http://studio_client;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header HOST $http_host;
    }

    location /studio/api {
        proxy_pass http://studio_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    location /studio/socket {
        rewrite ^/studio(.*) /$1 break;
        proxy_pass http://studio_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    ############################
    # STORAGE

    location /storage {
        proxy_pass http://storage_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_read_timeout 24h;
    }

    ############################
    # ATOMID

    # Redirect /atomid (no trailing slash) -> /atomid/
    location = /atomid {
        return 301 /atomid/;
    }

    # AtomID UI: patch base href so Angular assets resolve under /atomid/
    location /atomid/ {
        proxy_pass http://atomid/;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header Host $http_host;
        # Disable upstream gzip so sub_filter can process the HTML
        proxy_set_header Accept-Encoding '';
        sub_filter '<base href="/">' '<base href="/atomid/">';
        sub_filter_once on;
    }

    # /api/atomid/ luôn route tới atomid, tránh bị nhầm sang DF api khi có XSRF cookie
    location /api/atomid/ {
        proxy_pass http://atomid/api/atomid/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # AtomID API: Angular app uses absolute /api/... paths (apiOrigin: '' in env.prod.ts)
    location /api/ {
        proxy_pass http://atomid/api/;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    # AtomID static assets: CSS uses absolute /assets/... paths (fonts, icons)
    location /assets/ {
        proxy_pass http://atomid/assets/;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    ############################
    # DEVICE FARM

    location = /devicefarm {
        return 301 /devicefarm/;
    }

    location /devicefarm/socket.io/ {
        proxy_pass http://df_websocket/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /devicefarm/api/ {
        proxy_pass http://df_api/api/;
        proxy_read_timeout 3600s;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /devicefarm/s/image/ {
        proxy_pass http://df_storage_image/s/image/;
        add_header Access-Control-Allow-Origin *;
    }

    location /devicefarm/s/apk/ {
        proxy_pass http://df_storage_apk/s/apk/;
    }

    location /devicefarm/s/ipa/ {
        proxy_pass http://df_storage_ipa/s/ipa/;
    }

    location /devicefarm/s/permanent/ {
        proxy_pass http://df_storage_permanent/s/permanent/;
    }

    location /devicefarm/s/ {
        proxy_pass http://df_storage/s/;
    }

    location /devicefarm/c/ {
        proxy_pass http://df_stream_gate/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;
    }

    location /devicefarm/c-audio/ {
        proxy_pass http://df_stream_gate_audio/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;
    }

    location /devicefarm/ {
        proxy_pass http://df_app/;
        proxy_redirect / /devicefarm/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        add_header X-Frame-Options "SAMEORIGIN";
    }

}

server {
    listen 81;
    server_name 10.193.9.70;
    client_max_body_size 1024M;

    location /socket.io/ {
        proxy_pass http://df_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/ {
        proxy_pass http://df_api/api/;
        proxy_read_timeout 3600s;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /s/image/ { proxy_pass http://df_storage_image; add_header Access-Control-Allow-Origin *; }
    location /s/apk/   { proxy_pass http://df_storage_apk; }
    location /s/ipa/   { proxy_pass http://df_storage_ipa; }
    location /s/permanent/ { proxy_pass http://df_storage_permanent; }
    location /s/       { proxy_pass http://df_storage; }
    location /c/ {
        proxy_pass http://df_stream_gate/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
    location / {
        proxy_pass http://df_app/;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

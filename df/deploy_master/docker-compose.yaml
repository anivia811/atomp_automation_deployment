version: "2.4"

# Fixed subnet for the project's default network — pinned here (not
# pre-created by a script) so Compose owns it with its own labels and
# recognizes it as "its" network on every run, instead of colliding with a
# manually-created network of the same name/subnet.
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1

services:
  rethinkdb:
    image: rethinkdb:latest
    container_name: rethinkdb
    volumes:
      - ${RETHINKDB_VOLUME}:/data
    ports:
      - "8080:8080"
      - "28015:28015"
    command: rethinkdb --bind all --cache-size 2048 --no-update-check
  redis:
    image: redis:8.2.2
    container_name: redis
    volumes:
      - ${REDIS_VOLUME}:/data
    ports:
      - "6379:6379"
  mysql:
    image: mysql:8.0.24
    container_name: mysql
    healthcheck:
      test: mysql -u atomp --password=atomp@12345 -e "SHOW DATABASES;"
    volumes:
      - ${MYSQL_VOLUME}:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=atomp
      - MYSQL_PASSWORD=atomp@12345
      - MYSQL_DATABASE=df_statistical
  migrate:
    image: ${DEVICEFARM_IMAGE}
    container_name: migrate
    depends_on:
      - rethinkdb
    environment:
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
    # On a fresh RethinkDB data dir, the container reports "started" before
    # shard/replica election finishes, so the first migrate attempt fails with
    # ReqlOpFailedError: primary replica ... not available — and since api/app/
    # etc. all require migrate to complete successfully, that one race takes
    # down the whole device farm stack (df-nginx included). Retry instead of
    # failing once.
    command: >
      sh -c '
        for i in $(seq 1 18); do
          stf migrate && exit 0
          echo "[migrate] attempt $$i failed (rethinkdb not fully ready yet), retrying in 10s..."
          sleep 10
        done
        echo "[migrate] giving up after 18 attempts"
        exit 1
      '
  migrate-mysql:
    image: ${DEVICEFARM_IMAGE}
    container_name: migrate-mysql
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DB=df_statistical
      - MYSQL_USER=atomp
      - MYSQL_PASS=atomp@12345
    command: stf migrate-mysql
  api:
    image: ${DEVICEFARM_IMAGE}
    container_name: api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-mysql:
        condition: service_completed_successfully
    volumes:
      - ./kconfig:/config
    environment:
      - SECRET=${SECRET_KEY}
      - MYSQL_HOST=mysql
      - MYSQL_USER=atomp
      - MYSQL_PASS=atomp@12345
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
      - REDIS_HOST=redis
    ports:
      - "3700:3000"
    command: >
      stf api
      --port 3000
      --connect-sub tcp://triproxy-app:7150
      --connect-push tcp://triproxy-app:7170
      --public-key-path "/config/client-publickey.pem"
      --auth-url "${ATOMID_URL}"
      --administrator "${ADMINISTRATOR}" 
      --connect-push-dev tcp://triproxy-dev:7270 
      --connect-sub-dev tcp://triproxy-dev:7250 
      --device-farm-service-token "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7InNlcnZpY2Vfa2V5IjoiREYiLCJhbGxvd19zZXJ2aWNlIjpbIlRNIiwiVGVzdGVyNDAiLCJBVE9NSUQiLCJTdG9yYWdlIl19LCJpYXQiOjE1OTYwOTE3MzN9.fx-Jb-4mo8V6LkYN39t16za3xmWruIndzZcfinDXGIcPIE71okALCl1x2gikv8nJMWJGwSug68vFgrDVW5n_yjI60Mq-qO3rpT8vxVvCEjgAKtMWyXFn_erRufoLJE0RNNVWmUzQWhelbJoA2OLcOLckBUY8W1igu-Mf7b3tFgc" 
      --list-company-api "${LIST_COMPANY_API}" 
      --external-storage-url "${EXTERNAL_STORAGE_URL}"
      --storage-url ${STORAGE_URL}
      --list-user-api ${LIST_USER_API}
  app:
    image: ${DEVICEFARM_IMAGE}
    container_name: app
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-mysql:
        condition: service_completed_successfully
    volumes:
      - ./kconfig:/config
    environment:
      - SECRET=${SECRET_KEY}
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
      - REDIS_HOST=redis
    ports:
      - "3100:3000"
    command: >
      stf app 
      --port 3000 
      --auth-url "${WEB_APP_AUTH_URL}" 
      --websocket-url "${WEB_APP_URL}" 
      --public-key-path "/config/client-publickey.pem" 
      --device-farm-service-token "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7InNlcnZpY2Vfa2V5IjoiVGVzdGVyNDAiLCJhbGxvd19zZXJ2aWNlIjpbIkRGIiwiVGFza2VyIiwiQVRPTUlEIl19LCJpYXQiOjE1ODM5OTkyNzZ9.ha55v-J72QLkcW3Won9ivTOZraEWyFrvDbei4tmW6ftfNFM47UJAhJSO_tBqEziHqXcUWUsv8TRvbIRa5FqdYCy6E7Enno9oVub4JsXh0CvVLs6_kRO12PLOlcfEkRKg3fxUT0PJ1flEugAey7J7xDKF2J6rEef84pLYYf5jgrY" 
      --administrator ${ADMINISTRATOR} 
      --env ${BUILD_ENV} 
      --user-info-api-path "${API_GET_USER_INFO_URL}"
  groups-engine:
    image: ${DEVICEFARM_IMAGE}
    container_name: groups-engine
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-mysql:
        condition: service_completed_successfully
    environment:
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
    command: > 
      stf groups-engine 
      --connect-sub tcp://triproxy-app:7150 
      --connect-push tcp://triproxy-app:7170 
      --connect-push-dev tcp://triproxy-dev:7270 
      --connect-sub-dev tcp://triproxy-dev:7250
  processor:
    image: ${DEVICEFARM_IMAGE}
    container_name: processor
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-mysql:
        condition: service_completed_successfully
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DB=df_statistical
      - MYSQL_USER=atomp
      - MYSQL_PASS=atomp@12345
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
    command: > 
      stf processor  
      --connect-app-dealer "tcp://triproxy-app:7160" 
      --connect-dev-dealer "tcp://triproxy-dev:7260" 
      --report-dealer tcp://report:7300 
      --administrator ${ADMINISTRATOR}
  reaper:
    image: ${DEVICEFARM_IMAGE}
    container_name: reaper
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
    command: > 
      stf reaper 
      --connect-push tcp://triproxy-dev:7270 
      --connect-sub tcp://triproxy-app:7150 
      --heartbeat-timeout 30000
  report:
    image: ${DEVICEFARM_IMAGE}
    container_name: report
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-mysql:
        condition: service_completed_successfully
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DB=df_statistical
      - MYSQL_USER=atomp
      - MYSQL_PASS=atomp@12345
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
    command: stf report --report-dealer tcp://*:7300
  schedule-job:
    image: ${DEVICEFARM_IMAGE}
    container_name: schedule-job
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-mysql:
        condition: service_completed_successfully
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DB=df_statistical
      - MYSQL_USER=atomp
      - MYSQL_PASS=atomp@12345
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
    command: > 
      stf schedule-job 
      --connect-sub tcp://triproxy-dev:7250 
      --connect-push tcp://triproxy-dev:7270 
      --connect-push-app tcp://triproxy-app:7170 
  storage-temp:
    image: ${DEVICEFARM_IMAGE}
    container_name: storage-temp
    restart: unless-stopped
    volumes:
      - ${STORAGE_VOLUME}:/data
    ports:
      - "3500:3000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DB=df_statistical
      - MYSQL_USER=atomp
      - MYSQL_PASS=atomp@12345
    command: > 
      stf storage-temp 
      --port 3000 
      --save-dir /data
  storage-permanent:
    image: ${DEVICEFARM_IMAGE}
    container_name: storage-permanent
    restart: unless-stopped
    volumes:
      - ${STORAGE_PERMANENT_VOLUME}:/data
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DB=df_statistical
      - MYSQL_USER=atomp
      - MYSQL_PASS=atomp@12345
    ports:
      - "4200:3000"
    command: > 
      stf storage-permanent 
      --port 3000 
      --save-dir /data
  storage-plugin-image:
    image: ${DEVICEFARM_IMAGE}
    container_name: storage-plugin-image
    restart: unless-stopped
    depends_on:
      - storage-temp
    ports:
      - "3400:3000"
    command: > 
      stf storage-plugin-image 
      --port 3000 
      --storage-url ${STORAGE_URL}
  storage-plugin-apk:
    image: ${DEVICEFARM_IMAGE}
    container_name: storage-plugin-apk
    restart: unless-stopped
    depends_on:
      - storage-temp
    volumes:
      - ${STORAGE_VOLUME}:/data
    ports:
      - "3300:3000"
    command: > 
      stf storage-plugin-apk 
      --port 3000 
      --storage-url ${STORAGE_URL} 
      --cache-dir /data
  storage-plugin-ipa:
    image: ${DEVICEFARM_IMAGE}
    container_name: storage-plugin-ipa
    restart: unless-stopped
    depends_on:
      - storage-temp
    volumes:
      - ${STORAGE_VOLUME}:/data
    ports:
      - "3800:3000"
    command: > 
      stf storage-plugin-ipa 
      --port 3000 
      --storage-url ${STORAGE_URL} 
      --cache-dir /data
  stream-gate:
    image: ${DEVICEFARM_IMAGE}
    container_name: stream-gate
    restart: unless-stopped
    ports:
      - "3900:3000"
      - "7280:7280"
    command: > 
      stf stream-gate 
      --stream-gate-client-port 3000 
      --stream-gate-device-port 7280
  stream-gate-audio:
    image: ${DEVICEFARM_IMAGE}
    container_name: stream-gate-audio
    restart: unless-stopped
    ports:
      - "4100:3000"
      - "7290:7290"
    command: > 
      stf stream-gate-audio 
      --stream-gate-audio-client-port 3000 
      --stream-gate-audio-device-port 7290
  triproxy-app:
    image: ${DEVICEFARM_IMAGE}
    container_name: triproxy-app
    restart: unless-stopped
    ports:
      - "7150:7150"
      - "7160:7160"
      - "7170:7170"
    command: > 
      stf triproxy 
      --bind-pub tcp://*:7150 
      --bind-dealer tcp://*:7160 
      --bind-pull tcp://*:7170
  triproxy-dev:
    image: ${DEVICEFARM_IMAGE}
    container_name: triproxy-dev
    restart: unless-stopped
    ports:
      - "7250:7250"
      - "7260:7260"
      - "7270:7270"
    command: >
      stf triproxy 
      --bind-pub tcp://*:7250 
      --bind-dealer tcp://*:7260 
      --bind-pull tcp://*:7270
  websocket:
    image: ${DEVICEFARM_IMAGE}
    container_name: websocket
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate-mysql:
        condition: service_completed_successfully
    ports:
      - "3600:3000"
    volumes:
      - ./kconfig:/config
    environment:
      - SECRET=${SECRET_KEY}
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
      - NODE_OPTIONS=--max-old-space-size=4096
    command: > 
      stf websocket 
      --port 3000 
      --storage-url "${STORAGE_URL}" 
      --connect-sub tcp://triproxy-app:7150 
      --connect-push tcp://triproxy-app:7170
      --private-key-path "/config/client-privatekey.pem"
  # provider-linux has no --local-ip pinned (unlike provider-android below),
  # so it falls back to `my-local-ip`'s auto-detection -- which returns a
  # different result across restarts on a multi-interface host, changing the
  # mac_address this provider registers under every time (getMacAddress()
  # looks up the mac of whichever interface has options.localIp bound).
  # Every manually-added Host Unit device is owned by mac+type in the
  # `providers` table, so each restart orphans previously-known devices —
  # the redetector never learns about them because it only reconnects to
  # devices already present in *this session's* provider.devices array.
  # Pin --local-ip so the mac_address stays stable across restarts, same as
  # provider-android already does.
  provider:
    image: ${DEVICEFARM_IMAGE}
    container_name: provider
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - ./kconfig:/config
      - /dev/bus/usb:/dev/bus/usb
    command: >
      stf provider-linux
      --name "local-245"
      --location "local"
      --local-ip "${DOMAIN}"
      --connect-sub tcp://10.42.0.245:7250
      --connect-push tcp://10.42.0.245:7270
      --storage-url http://10.42.0.245:3500
      --storage-permanent-url http://10.42.0.245:4200
      --provider-storage-url http://10.42.0.245:3500/storage/upload
      --min-port 11000
      --max-port 12000
      --heartbeat-interval 10000
      --screen-ws-url-pattern "ws://10.42.0.245:8180/d/local/<%= serial %>/<%= publicPort %>/"
      --stream-gate-client-pattern "ws://10.42.0.245:8180/c"
      --stream-gate-device-pattern "ws://10.42.0.245:8180/dv"
      --using-stream-gate true
      --using-appium false
      --appium-config ""
      --screen-jpeg-quality 80
      --fps 10
      --device-farm-service-token "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7InNlcnZpY2Vfa2V5IjoiREYiLCJhbGxvd19zZXJ2aWNlIjpbIlRNIiwiVGVzdGVyNDAiLCJBVE9NSUQiLCJTdG9yYWdlIl19LCJpYXQiOjE1OTYwOTE3MzN9.fx-Jb-4mo8V6LkYN39t16za3xmWruIndzZcfinDXGIcPIE71okALCl1x2gikv8nJMWJGwSug68vFgrDVW5n_yjI60Mq-qO3rpT8vxVvCEjgAKtMWyXFn_erRufoLJE0RNNVWmUzQWhelbJoA2OLcOLckBUY8W1igu-Mf7b3tFgc"

  # Real Android device provider (ADB-based) — separate from provider-linux
  # above, which only manages SSH-based virtual "Host Units" and cannot see
  # physical USB devices. The devicefarm image already bundles its own adb
  # binary and Node adb client (adbkit), so no host-level adb/Android Studio
  # install is needed anywhere — network_mode: host + privileged + the usb
  # bus mount are the only requirements, and they're already set below.
  provider-android:
    image: ${DEVICEFARM_IMAGE}
    container_name: provider-android
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - ./kconfig:/config
      - /dev/bus/usb:/dev/bus/usb
    command: >
      stf provider
      --name "android-${DOMAIN}"
      --location "androidlocal"
      --local-ip ${DOMAIN}
      --connect-sub tcp://${DOMAIN}:7250
      --connect-push tcp://${DOMAIN}:7270
      --storage-url http://${DOMAIN}:3500
      --storage-permanent-url http://${DOMAIN}:4200
      --provider-storage-url http://${DOMAIN}:3500/storage/upload
      --min-port 12000
      --max-port 13000
      --heartbeat-interval 10000
      --screen-ws-url-pattern "ws://${DOMAIN}:8180/d/androidlocal/<%= serial %>/<%= publicPort %>/"
      --stream-gate-client-pattern "ws://${DOMAIN}/devicefarm/c"
      --stream-gate-device-pattern "ws://${DOMAIN}:8180/dv"
      --stream-gate-audio-client-pattern "ws://${DOMAIN}/devicefarm/c-audio"
      --stream-gate-audio-device-pattern "ws://${DOMAIN}:8180/dv-audio"
      --using-stream-gate true
      --using-appium true
      --appium-url "${DOMAIN}:4723"
      --appium-config ""
      --screen-jpeg-quality 80
      --fps 10
      --device-farm-service-token "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7InNlcnZpY2Vfa2V5IjoiREYiLCJhbGxvd19zZXJ2aWNlIjpbIlRNIiwiVGVzdGVyNDAiLCJBVE9NSUQiLCJTdG9yYWdlIl19LCJpYXQiOjE1OTYwOTE3MzN9.fx-Jb-4mo8V6LkYN39t16za3xmWruIndzZcfinDXGIcPIE71okALCl1x2gikv8nJMWJGwSug68vFgrDVW5n_yjI60Mq-qO3rpT8vxVvCEjgAKtMWyXFn_erRufoLJE0RNNVWmUzQWhelbJoA2OLcOLckBUY8W1igu-Mf7b3tFgc"




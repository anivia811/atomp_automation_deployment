#daemon off;
worker_processes 4;

events {
  worker_connections 1024;
}

http {
  # upstream stf_db {
  #   server 35.161.108.218:8080 max_fails=0;
  # }

  upstream stf_app {
    server 10.38.70.65:3100 max_fails=0;
  }

  upstream stf_auth {
    server 10.38.70.65:3200 max_fails=0;
  }

  upstream stf_storage_apk {
    server 10.38.70.65:3300 max_fails=0;
  }

  upstream stf_storage_image {
    server 10.38.70.65:3400 max_fails=0;
  }

  upstream stf_storage_permanent {
    server 10.38.70.65:4200 max_fails=0;
  }

  upstream stf_storage {
    server 10.38.70.65:3500 max_fails=0;
  }

  upstream stf_websocket {
    server 10.38.70.65:3600 max_fails=0;
  }

  upstream stf_api {
    server 10.38.70.65:3700 max_fails=0;
  }

  upstream stf_api_fpt {
    server 10.38.70.65:3710 max_fails=0;
  }

  upstream stf_storage_ipa {
    server 10.38.70.65:3800 max_fails=0;
  }

  upstream stf_stream_gate_client {
    server 10.38.70.65:3900 max_fails=0;
  }

  upstream stf_stream_gate_device {
    server 10.38.70.65:7280 max_fails=0;
  }

  upstream stf_stream_gate_audio_client {
    server 10.38.70.65:4100 max_fails=0;
  }

  upstream stf_stream_gate_audio_device {
    server 10.38.70.65:7290 max_fails=0;
  }


  upstream stf_signaling {
    server 10.38.70.65:4000 max_fails=0;
  }

  upstream tester40_client {
      server 10.38.70.65:4101;
  }
  upstream tester40_api {
      server 10.38.70.65:3001;
  }
  upstream tester40_websocket {
      server 10.38.70.65:3030;
  }
  upstream tester40_tasker {
      server 10.38.70.65:3101;
  }
  upstream studio_client {
      server 10.38.70.65:4201;
  }
  upstream studio_api {
      server 10.38.70.65:3301;
  }
  upstream studio_websocket {
      server 10.38.70.65:3350;
  }
  upstream storage_api {
      server 10.38.70.65:6801;
  }
  upstream atomid {
      server 10.38.70.65:8081;
  }

  upstream tunnel {
      server 10.38.70.65:8888;
  }

  upstream ai {
      server 10.38.70.65:8000;
  }



  types {
    application/javascript  js;
    image/gif               gif;
    image/jpeg              jpg;
    text/css                css;
    text/html               html;
  }

  map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
  }

  log_format   main '$remote_addr - $remote_user [$time_local] $request_time $status '
                '"$request" $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /nginx.log  main;
  error_log /error.log error;
  server {
    #listen 80;                       #Need change

    listen 443 ssl;
    ssl_certificate /config/ca_cloudflare.pem;
    ssl_certificate_key /config/ca_cloudflare.key;

    server_name hae-devicefarm.atomp.io;
    keepalive_timeout 70;
    root /dev/null;
    # resolver 127.0.0.1 valid=300s;
    #resolver 8.8.4.4 8.8.8.8 valid=300s;
    #resolver_timeout 10s;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    client_max_body_size 1024M;

    # Handle stream gate client
    location /c/ {
      proxy_pass http://stf_stream_gate_client/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

     # Handle stream gate device
    location /dv/ {
      proxy_pass http://stf_stream_gate_device/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Handle stream gate audio client
    location /c-audio/ {
      proxy_pass http://stf_stream_gate_audio_client/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

     # Handle stream gate audio device
    location /dv-audio/ {
      proxy_pass http://stf_stream_gate_audio_device/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }


    location /signaling/ {
      proxy_pass http://stf_signaling/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass http://stf_websocket;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $http_x_real_ip;
    }

    location /auth/ {
      proxy_pass http://stf_auth/auth/;
    }

    location /auth/contact/ {
      proxy_pass http://stf_api/auth/contact/;
    }

    location /s/image/ {
      proxy_pass http://stf_storage_image;
      add_header Access-Control-Allow-Origin *;
    }

    location /s/apk/ {
      proxy_pass http://stf_storage_apk;
    }

    location /s/ipa/ {
      proxy_pass http://stf_storage_ipa;
    }

    location /s/ {
      client_max_body_size 1024M;
      client_body_buffer_size 128k;
      proxy_pass http://stf_storage;
    }

    location /s/permanent/ {
      proxy_pass http://stf_storage_permanent;
    }

    location /api/ {
      # if ($http_origin ~* ((https?://.*.atomp.io$)|(https?://10.16.8(8|9).([0-9]+)(:[0-9]+)?$)|(https?://.*.fsoft.com.vn$)|(https?://10.17.70.26(:[0-9]+)?$))) {
        #  add_header Access-Control-Allow-Origin "$http_origin" always;
      # }
      proxy_pass http://stf_api/api/;
      proxy_read_timeout 3600s;
      proxy_hide_header X-Powered-By;
    }

    location /api-fpt/ {
      proxy_pass http://stf_api_fpt/api-fpt/;
    }

    location / {
      # if ($http_origin ~* ((https?://.*.atomp.io$)|(https?://10.16.8(8|9).([0-9]+)(:[0-9]+)?$)|(https?://.*.fsoft.com.vn$)|(https?://10.17.70.26(:[0-9]+)?$))) { 
	#  add_header Access-Control-Allow-Origin "$http_origin" always;
      # }
      add_header X-Frame-Options "SAMEORIGIN";
      proxy_set_header X-Forwarded-Proto https;	
      proxy_pass http://stf_app;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-RealA-IP $http_x_real_ip;
      proxy_hide_header X-Powered-By;
      proxy_hide_header x-powered-by;
      proxy_cookie_flags token "";
      proxy_cookie_flags ~.* HttpOnly Secure;
    }
  }

  server {
    #listen 80;
    listen 443 ssl;
    ssl_certificate /config/ca_cloudflare.pem;
    ssl_certificate_key /config/ca_cloudflare.key;                   
    server_name hae-automation.atomp.io;
    keepalive_timeout 70;
    root /dev/null;
    # resolver 127.0.0.1 valid=300s;
    client_max_body_size        500M;
    
    location / {
    	rewrite ^/$ https://hae-automation.atomp.io/tester40;
    }

    location /tester40 {
        rewrite ^/tester40(.*) /$1 break;
        proxy_pass http://tester40_client;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header HOST $http_host;
    }

    location /tester40/api {
        proxy_pass http://tester40_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    location /tester40/uploads {
        rewrite ^/tester40/(.*) /$1 break;
        proxy_pass http://tester40_api;
    }

    location /tester40/socket.io/ {
        rewrite ^/tester40/(.*) /$1 break;
        proxy_pass          http://tester40_websocket;
        # proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header    X-Real-IP $http_x_real_ip;

        # Websocket
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        # proxy_set_header    Host $host;
        # add_header          Cache-Control no-cache;
    }

    ############################
    # TASKER

    location /tasker/api {
        proxy_pass http://tester40_tasker;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    location /tasker/uploads {
        rewrite ^/tasker/(.*) /$1 break;
        proxy_pass http://tester40_tasker;
    }

    ############################
    # STUDIO

    location /studio {
        rewrite ^/studio(.*) /$1 break;
        proxy_pass http://studio_client;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header HOST $http_host;
    }

    location /studio/api {
        proxy_pass http://studio_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    location /studio/socket {
        rewrite ^/studio(.*) /$1 break;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    Host $host;
        proxy_pass          http://studio_websocket;

        # Websocket
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "Upgrade";
    }

    ############################
    # STORAGE

    location /storage {
        proxy_pass http://storage_api;
        proxy_redirect off;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }

    # location /db {
    #	proxy_pass http://stf_db;
    # }
  }

  # server {
	# listen 80;
	# server_name 35.161.108.218;
	# location /tn/ {
	# 	proxy_pass http://tunnel/;
	# }
  # }

  server {
	#listen 80;

        listen 443 ssl;
        ssl_certificate /config/ca_cloudflare.pem;
        ssl_certificate_key /config/ca_cloudflare.key;

	server_name hae-us-ai.atomp.io;

	location / {
		proxy_pass http://ai;
	}
  }
  server {
        #listen 80;

        listen 443 ssl;
        ssl_certificate /config/ca_cloudflare.pem;
        ssl_certificate_key /config/ca_cloudflare.key;

        server_name hae-id.atomp.io;
        location / {
          proxy_pass http://atomid;
        }
  }
}

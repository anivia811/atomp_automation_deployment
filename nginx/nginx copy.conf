user  nginx;
worker_processes  auto;
# worker_processes  4;

error_log  /etc/stderr notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /etc/stdout  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;

    upstream tester40_client {
        server 10.38.70.65:34100;
    }
    upstream tester40_api {
        server 10.38.70.65:33000;
    }
    upstream tester40_websocket {
        server 10.38.70.65:33030;
    }
    upstream fakescreen_websocket {
        server 10.38.70.65:3111;
    }
    upstream fakeaudio_websocket {
        server 10.38.70.65:3222;
    }
    upstream tester40_tasker {
        server 10.38.70.65:33100;
    }
    upstream studio_client {
        server 10.38.70.65:34200;
    }
    upstream studio_api {
        server 10.38.70.65:33300;
    }
    upstream studio_websocket {
        server 10.38.70.65:33350;
    }
    upstream storage_api {
        server 10.38.70.65:6800;
    }
    upstream testman_client {
        server 10.38.70.65:33220;
    }
    upstream testman_api {
        server 10.38.70.65:33230;
    }
    upstream atomid {
        server 10.38.70.65:8081;
    }
    upstream storage_provider1 {
        server 10.38.70.65:36800;
    }

    # Dummy server
    upstream dummy {
        server 10.38.70.65:3001;
        server 10.38.70.65:3002;
        server 10.38.70.65:3003;

        # server localhost:3001;
        # server localhost:3002;
        # server localhost:3003;
    }
 
    # Redirect all traffic to HTTPS
    server {
        listen 80;
        # Domain/IP
        server_name 10.38.70.65;
        client_max_body_size 5000M;
        proxy_headers_hash_max_size  512;
        proxy_headers_hash_bucket_size  64;

    # ############# Enable ssl
    #     return 301 https://$host$request_uri;
    # }
    # server {
    #     listen 443 ssl;
    #     # listen 80;
    
    #     # Add your domain/your IP
    #     server_name 10.38.70.65;
    
    #     # # server certificate
    #     ssl_certificate     /idata/server.pem;
    #     ssl_certificate_key /idata/server.key;
    
    #     # CA certificate
    #     ssl_client_certificate /idata/ca.pem;
    
        # # need to validate client certificate(if this flag optional_no_ca it won't validate client certificates)
        # # Cause "No required ssl certificate was sent"
        # ssl_verify_client on;
    # ############

        location / {
            
        }

        ############################
        # NOTE: For include proxy_params work
        # step1: Create a file named proxy_params
        # step2: Add below line
        # proxy_set_header Host $http_host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;

        ############################
        # TESTER 40

        location /tester40 {
            rewrite ^/tester40(.*) /$1 break;
            proxy_pass http://tester40_client;
            include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_set_header HOST $http_host;
        }

        location /tester40/api {
            proxy_pass http://tester40_api;
            include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 100;
        }

        location /tester40/uploads {
            rewrite ^/tester40/(.*) /$1 break;
            proxy_pass http://tester40_api;
        }
        location /tester40/lib {
            rewrite ^/tester40/(.*) /$1 break;
            proxy_pass http://tester40_api;
        }

        location /tester40/socket.io/ {
            rewrite ^/tester40/(.*) /$1 break;
            proxy_pass          http://tester40_websocket;
            # proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header    X-Real-IP $http_x_real_ip;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
            # proxy_set_header    Host $host;
            # add_header          Cache-Control no-cache;
        }

        # ############################
        # # TASKER

        location /tasker/api {
            proxy_pass http://tester40_tasker;
            include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
        }

        location /tasker/uploads {
            rewrite ^/tasker/(.*) /$1 break;
            proxy_pass http://tester40_tasker;
        }

        ############################
        # STUDIO

        location /studio {
            rewrite ^/studio(.*) /$1 break;
            proxy_pass http://studio_client;
            include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_set_header HOST $http_host;
        }

        location /studio/api {
            proxy_pass http://studio_api;
            include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
        }

        location /studio/socket {
            rewrite ^/studio(.*) /$1 break;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    Host $host;
            proxy_pass          http://studio_websocket;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
        }

        ############################
        # STORAGE

        location /storage {
            proxy_pass http://storage_api;
            include proxy_params;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider1/([^/]+)(.*)" {
            proxy_pass http://storage_provider1/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider2/([^/]+)(.*)" {
            proxy_pass http://storage_provider2/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider3/([^/]+)(.*)" {
            proxy_pass http://storage_provider3/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/provider4/([^/]+)(.*)" {
            proxy_pass http://storage_provider4/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/providerkrhae/([^/]+)(.*)" {
            proxy_pass http://storage_provider_krhae/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }
        location ~ "/fs/providerqood1/([^/]+)(.*)" {
            proxy_pass http://storage_provider_qood1/$1$2$is_args$args;
            proxy_redirect off;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $http_x_real_ip;
            proxy_read_timeout 24h;
        }

        location /fakescreen/socket {
            rewrite ^/fakescreen(.*) /$1 break;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    Host $host;
            proxy_pass          http://fakescreen_websocket;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
        }
        location /fakeaudio/socket {
            rewrite ^/fakeaudio(.*) /$1 break;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    Host $host;
            proxy_pass          http://fakeaudio_websocket;

            # Websocket
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "Upgrade";
        }

        ############################
        # TESTMAN

        ## NOT behind path
        # location / {
        #     proxy_pass           http://testman_client;
        #     include              proxy_params;
        #     proxy_redirect       off;
        #     proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header     X-Real-IP $http_x_real_ip;
        # }
        ## Behind path
        location /testman {
            rewrite ^/testman(.*) /$1 break;
            proxy_pass           http://testman_client;
            include              proxy_params;
            proxy_redirect       off;
            proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header     X-Real-IP $http_x_real_ip;
        }

        location /testman/api {
            proxy_pass           http://testman_api;
            include              proxy_params;
            proxy_redirect       off;
            proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header     X-Real-IP $http_x_real_ip;
        }

        # # NOT behind path
        # location /milestone {
        #     proxy_pass           http://testman_api;
        #     include              proxy_params;
        #     proxy_redirect       off;
        #     proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header     X-Real-IP $http_x_real_ip;
        # }

        # NOT behind path
        location /testman/milestone {
            rewrite ^/testman/(.*) /$1 break;
            proxy_pass http://testman_api;
        }

        # location /socket.io/ {
        #	proxy_pass          http://testman_websocket;
        #	proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        #	proxy_set_header    X-Real-IP $http_x_real_ip;
        #	
        #	# Websocket
        #	proxy_http_version  1.1;
        #	proxy_set_header    Upgrade $http_upgrade;
        #	proxy_set_header    Connection "Upgrade";
        #	add_header          Cache-Control no-cache;
        # }

        ############################
        # ATOMID
        location /atomid/ {
            proxy_pass http://10.38.70.65:8081/; # the last "/" character had effect?
        }
        # location /atomid {
        #     rewrite ^/atomid(.*) /$1 break;
        #     proxy_pass http://10.38.70.65:3800;
        #     include proxy_params;
        #     proxy_redirect off;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Real-IP $http_x_real_ip;
        #     proxy_set_header HOST $http_host;
        # }
        # location /atomid/api {
        #     proxy_pass http://10.38.70.65:3800/api;
        # }

        ############################
        # Dummy, testing purpose
        location /ai {
            # strip the "/ai" prefix from the path when forwarding to 
            # rewrite ^/ai(/.*)$ $1 break;
            proxy_pass http://dummy;
            # include proxy_params;
            # proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    }
}
